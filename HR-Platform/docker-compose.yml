services:
  postgres:
    image: postgres:16-alpine
    container_name: hr_platform_db
    environment:
      POSTGRES_DB: hr_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - hr_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./apps/backend
    container_name: hr_platform_backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:password@postgres:5432/hr_platform
      PORT: 5000
      FRONTEND_URL: http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./apps/backend:/app
      - /app/node_modules
    networks:
      - hr_network
    restart: unless-stopped

  frontend:
    build: ./apps/frontend
    container_name: hr_platform_frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:5000/api/v1
    volumes:
      - ./apps/frontend:/app
      - /app/node_modules
    networks:
      - hr_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  hr_network:
    driver: bridge
